services:
  - type: web
    name: fsad-lms-backend
    runtime: docker
    rootDir: backend-spring
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
